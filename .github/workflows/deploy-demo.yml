name: Deploy Demo
on:
  push:
    branches: [main]
    paths: ["examples/**", "packages/**"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter journey-stack build
      - run: pnpm --filter asset-register build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/asset-register/dist
      - id: deployment
        uses: actions/deploy-pages@v4
